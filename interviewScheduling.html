<!DOCTYPE html>
<html>
<head>
    <title>Interview Scheduling Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f9;
            text-align: center;
        }

        .form-container {
            display: flex;
            justify-content: center;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: left;
        }

        input, select, button {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            margin-bottom: 15px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .table-container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        table {
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>

<h2>Interview Scheduling Management</h2>

<div class="form-container">
<form id="interviewForm">

    <label>Select Shortlisted Candidate:</label>
    <select id="candidate" required>
        <option value="">-- Select Candidate --</option>
    </select>

    <label>Interview Date:</label>
    <input type="date" id="date" required>

    <label>Interview Time:</label>
    <input type="time" id="time" required>

    <label>Interview Type:</label>
    <select id="type" required>
        <option value="">-- Select Type --</option>
        <option>Online</option>
        <option>Onsite</option>
    </select>

    <label>Location / Meeting Link:</label>
    <input type="text" id="details" placeholder="Enter location or link" required>

    <button type="submit">Create Interview Schedule</button>

    <p id="message"></p>

</form>
</div>

<h3>Scheduled Interviews</h3>

<div class="table-container">
<table id="interviewTable">
    <thead>
        <tr>
            <th>Candidate</th>
            <th>Date (DD/MM/YYYY)</th>
            <th>Time</th>
            <th>Type</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
</div>

<script>
    const form = document.getElementById("interviewForm");
    const message = document.getElementById("message");
    const tableBody = document.querySelector("#interviewTable tbody");
    const candidateSelect = document.getElementById("candidate");
    const dateInput = document.getElementById("date");


    const shortlistedCandidates = [
        "Alice Tan",
        "John Lee",
        "Siti Ahmad"
    ];

    shortlistedCandidates.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        candidateSelect.appendChild(option);
    });


    const today = new Date();
    const oneYearLater = new Date();
    oneYearLater.setFullYear(today.getFullYear() + 1);

    dateInput.min = today.toISOString().split("T")[0];
    dateInput.max = oneYearLater.toISOString().split("T")[0];


    form.addEventListener("submit", function(event) {
        event.preventDefault();

        const candidate = candidateSelect.value;
        const date = dateInput.value;
        const time = document.getElementById("time").value;
        const type = document.getElementById("type").value;
        const details = document.getElementById("details").value.trim();

        message.textContent = "";
        message.className = "";

        if (!candidate || !date || !time || !type || !details) {
            message.textContent = "All fields are required.";
            message.className = "error";
            return;
        }

        const selectedDateTime = new Date(date + "T" + time);

        if (selectedDateTime > oneYearLater) {
            message.textContent = "Interview date cannot exceed 1 year from today.";
            message.className = "error";
            return;
        }


        const [hour, minute] = time.split(":").map(Number);

        if (hour < 10 || hour >= 18) {
            message.textContent = "Interview time must be between 10:00 AM and 6:00 PM.";
            message.className = "error";
            return;
        }


        const urlPattern = /^(https?:\/\/)[^\s]+$/;
        const locationPattern = /^[a-zA-Z0-9\s,.-]{5,}$/;

        if (type === "Online") {
            if (!urlPattern.test(details)) {
                message.textContent = "Online interview must contain a valid URL link.";
                message.className = "error";
                return;
            }
        }

        if (type === "Onsite") {
            if (!locationPattern.test(details) || urlPattern.test(details)) {
                message.textContent = "Onsite interview must contain a valid physical location.";
                message.className = "error";
                return;
            }
        }

        const dateObj = new Date(date);
        const formattedDate = 
            ("0" + dateObj.getDate()).slice(-2) + "/" +
            ("0" + (dateObj.getMonth() + 1)).slice(-2) + "/" +
            dateObj.getFullYear();

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${candidate}</td>
            <td>${formattedDate}</td>
            <td>${time}</td>
            <td>${type}</td>
            <td>${details}</td>
        `;

        tableBody.appendChild(row);

        message.textContent = "Interview scheduled successfully!";
        message.className = "success";

        form.reset();
    });
</script>

</body>
</html>
