<!DOCTYPE html>
<html>
<head>
<title>Job Seeker Dashboard</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #dbe6f6);
    margin: 0;
    padding: 40px;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.selector-section {
    text-align: center;
    margin-bottom: 30px;
}

.selector-section select,
.selector-section button {
    padding: 10px 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.selector-section select {
    width: 250px;
}

.selector-section button {
    background-color: #007bff;
    color: white;
    border: none;
    font-weight: 600;
    cursor: pointer;
    margin-left: 10px;
}

.selector-section button:hover {
    background-color: #0056b3;
}

.invitation-card {
    background: #f8f9ff;
    border-left: 5px solid #007bff;
    padding: 18px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.invitation-card .row {
    margin-bottom: 6px;
}

.label {
    font-weight: 600;
}

.status {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}

.status-pending {
    background-color: #fff3cd;
    color: #856404;
}

.status-confirmed {
    background-color: #d4edda;
    color: #155724;
}

.status-declined {
    background-color: #f8d7da;
    color: #721c24;
}

.no-data {
    text-align: center;
    padding: 20px;
    font-weight: 600;
    color: #888;
}
</style>
</head>

<body>

<h2>Job Seeker Dashboard</h2>

<div class="container">

<div class="selector-section">
    <select id="userSelect">
        <option value="">-- Select Your Account --</option>
    </select>
    <button onclick="loadInvitations()">View My Invitations</button>
</div>

<div id="container"></div>

</div>

<script>

let interviewData = JSON.parse(localStorage.getItem("interviews")) || [];
const userSelect = document.getElementById("userSelect");

// Generate user list dynamically
const uniqueUsers = [...new Set(interviewData.map(i => i.candidate))];

uniqueUsers.forEach(user => {
    const option = document.createElement("option");
    option.value = user;
    option.textContent = user;
    userSelect.appendChild(option);
});

function getStatusClass(status) {
    if (status === "Confirmed") return "status-confirmed";
    if (status === "Declined") return "status-declined";
    return "status-pending";
}

function loadInvitations() {

    interviewData = JSON.parse(localStorage.getItem("interviews")) || [];

    const selectedUser = userSelect.value;
    const container = document.getElementById("container");
    container.innerHTML = "";

    if (!selectedUser) {
        container.innerHTML = "<div class='no-data'>Please select your account.</div>";
        return;
    }

    const myInvites = interviewData
        .filter(i => i.candidate === selectedUser)
        .sort((a, b) => new Date(a.date + "T" + a.time) - new Date(b.date + "T" + b.time));

    if (myInvites.length === 0) {
        container.innerHTML = "<div class='no-data'>No interview invitations found.</div>";
        return;
    }

    myInvites.forEach(invite => {

        const card = document.createElement("div");
        card.className = "invitation-card";

        card.innerHTML = `
            <div class="row"><span class="label">Job:</span> ${invite.job}</div>
            <div class="row"><span class="label">Date:</span> ${invite.date}</div>
            <div class="row"><span class="label">Time:</span> ${invite.time}</div>
            <div class="row"><span class="label">Type:</span> ${invite.type}</div>
            <div class="row"><span class="label">Details:</span> ${invite.details}</div>
            <div class="row">
                <span class="label">Status:</span>
                <span class="status ${getStatusClass(invite.status)}">
                    ${invite.status}
                </span>
            </div>
        `;

        container.appendChild(card);
    });
}

</script>

</body>
</html>
