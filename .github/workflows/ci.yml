name: CI Pipeline - Automated Testing

on:
  push:
    branches: [ main, master, JOB-1-* ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Compile main code
        run: |
          javac *.java
          
      - name: Compile test code
        run: |
          javac -cp "src/main/java" src/test/java/com/mycompany/job/JobControllerTest.java
          
      - name: Run Unit Tests
        run: |
          java -cp "src/test/java:src/main/java" com.mycompany.job.JobControllerTest