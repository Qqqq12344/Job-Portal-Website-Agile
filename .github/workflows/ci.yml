name: CI Pipeline - Automated Testing

on:
  push:
    branches: [ main, master, JOB-19-* ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run JUnit tests
        run: |
          javac -cp ".;.mvn/lib/*" src/test/java/com/mycompany/job/JobControllerTest.java src/main/java/com/mycompany/job/*.java
          java -cp ".;.mvn/lib/*;src/test/java;src/main/java" org.junit.runner.JUnitCore com.mycompany.job.JobControllerTest