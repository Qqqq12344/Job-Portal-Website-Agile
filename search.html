<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Job Portal - Keyword Search</title>
  <link rel="stylesheet" href="search.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>JobPortal</h1>
          <p>Keyword Search</p>
        </div>
      </div>
      <div class="pill">Job Seeker • Search & Discovery</div>
    </div>

    <section class="hero">
      <h2>Search jobs</h2>
      <p class="sub">
        Search by <b>job title</b>, <b>skills</b>, or <b>company</b>. Case-insensitive + partial matching.
      </p>

      <div class="searchRow">
        <div class="inputGroup" role="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2"/>
            <path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="keyword" type="text" placeholder="e.g. java, business analyst, Silverlake, figma" />
        </div>

        <button class="btn" id="btnSearch">Search</button>
        <button class="btn secondary" id="btnClear">Clear</button>
      </div>

      <div id="status" class="status"></div>
      <div id="perf" class="perf"></div>

      <div class="resultsHead">
        <div class="count" id="countText">0 jobs</div>
      </div>

      <div id="results" class="list"></div>
    </section>
  </div>

  <script src="search_script.js"></script>
</body>
</html>
